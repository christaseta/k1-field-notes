<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const radius = size * 0.125;
  
  // Background with rounded corners
  ctx.fillStyle = '#0f172a';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, radius);
  ctx.fill();
  
  // Text
  ctx.fillStyle = 'white';
  ctx.font = `600 ${size * 0.25}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FN', size/2, size/2);
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);

// Output as data URLs for download
console.log('192:', document.getElementById('c192').toDataURL());
console.log('512:', document.getElementById('c512').toDataURL());
</script>
</body>
</html>
